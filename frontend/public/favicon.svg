<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#f43f5e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with premium gradient -->
  <rect width="100" height="100" rx="30" fill="url(#grad)" />
  
  <!-- Microphone Icon -->
  <g filter="url(#shadow)">
    <!-- Mic Body -->
    <rect x="42" y="25" width="16" height="30" rx="8" fill="white" />
    <!-- Mic Stand/Ring -->
    <path d="M35 50c0 8.3 6.7 15 15 15s15-6.7 15-15" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" />
    <!-- Stand Neck -->
    <line x1="50" y1="65" x2="50" y2="75" stroke="white" stroke-width="4" stroke-linecap="round" />
    <!-- Stand Base -->
    <line x1="40" y1="75" x2="60" y2="75" stroke="white" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
