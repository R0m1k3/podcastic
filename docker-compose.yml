version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: podcastic-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - podcastic_net

  redis:
    image: redis:7-alpine
    container_name: podcastic-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - podcastic_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: podcastic-app
    restart: unless-stopped
    ports:
      - "${PORT:-3579}:3579"
    environment:
      NODE_ENV: production
      PORT: 3579
      MONGODB_URI: mongodb://mongodb:27017/podcastic
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      PODCAST_INDEX_API_KEY: ${PODCAST_INDEX_API_KEY:-}
      PODCAST_INDEX_API_SECRET: ${PODCAST_INDEX_API_SECRET:-}
    depends_on:
      - mongodb
      - redis
    networks:
      - podcastic_net

volumes:
  mongodb_data:
  redis_data:

networks:
  podcastic_net:
    driver: bridge
