version: '3.8'

services:
  podcastic:
    build:
      context: .
      dockerfile: Dockerfile.unraid
    container_name: podcastic
    restart: unless-stopped
    ports:
      - "3579:3579"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://127.0.0.1:27017/podcastic
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      PODCAST_INDEX_API_KEY: ${PODCAST_INDEX_API_KEY:-}
      PODCAST_INDEX_API_SECRET: ${PODCAST_INDEX_API_SECRET:-}
    volumes:
      - podcastic_db:/data/db
      - podcastic_redis:/data/redis
      - podcastic_logs:/var/log/supervisor

volumes:
  podcastic_db:
  podcastic_redis:
  podcastic_logs:
